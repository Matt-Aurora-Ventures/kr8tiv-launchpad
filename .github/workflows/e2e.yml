name: E2E Tests

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC

env:
  NODE_VERSION: '20'

jobs:
  e2e-tests:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: kr8tiv_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup database
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/kr8tiv_e2e
        run: |
          npx prisma generate
          npx prisma db push
          # Seed only if seed script is defined in package.json
          node -e "const p=require('./package.json'); if(p.prisma && p.prisma.seed){ require('child_process').execSync('npx prisma db seed', {stdio:'inherit'}); } else { console.log('No seed script defined, skipping.'); }"

      - name: Start API server
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/kr8tiv_e2e
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          PORT: 3001
        run: |
          TS_NODE_TRANSPILE_ONLY=1 npm run dev > /tmp/api-dev.log 2>&1 &
          sleep 20
          curl -fsS "http://localhost:3001/health" > /dev/null || (cat /tmp/api-dev.log && exit 1)

      - name: Start web server
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_SOLANA_NETWORK: devnet
        run: |
          npm run dev > /tmp/web-dev.log 2>&1 &
          sleep 20
          curl -fsS "http://localhost:3000" > /dev/null || (cat /tmp/web-dev.log && exit 1)

      - name: Run E2E tests
        working-directory: apps/web
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:3001
        run: npx playwright test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: apps/web/test-results
          retention-days: 7

  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web
        working-directory: apps/web
        run: npm run build

      - name: Start web server for Lighthouse
        run: |
          npm run dev --workspace=apps/web > /tmp/lh-web.log 2>&1 &
          sleep 20
          curl -fsS "http://localhost:3000" > /dev/null || (cat /tmp/lh-web.log && exit 1)

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: '.lighthouserc.json'
          urls: |
            http://localhost:3000
          uploadArtifacts: true
          temporaryPublicStorage: true
